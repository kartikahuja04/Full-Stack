<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Concurrent Ticket Booking Demo</title>
	<style>
		body {
			font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
			margin: 0;
			padding: 2rem;
			background: #0f172a;
			color: #e5e7eb;
		}

		h1 {
			margin-bottom: 0.5rem;
		}

		.container {
			max-width: 800px;
			margin: 0 auto;
			background: #020617;
			border-radius: 0.75rem;
			padding: 1.5rem 2rem 2rem;
			box-shadow: 0 20px 50px rgba(15, 23, 42, 0.9);
			border: 1px solid #1f2937;
		}

		.seats {
			display: flex;
			gap: 1rem;
			margin: 1.5rem 0;
			flex-wrap: wrap;
		}

		.seat {
			width: 80px;
			height: 80px;
			border-radius: 0.75rem;
			border: 2px solid transparent;
			cursor: pointer;
			background: #111827;
			color: #e5e7eb;
			font-size: 1.1rem;
			font-weight: 600;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease;
		}

		.seat.available {
			border-color: #22c55e;
			background: radial-gradient(circle at 10% 0%, #22c55e33, #111827 60%);
		}

		.seat.booked {
			border-color: #ef4444;
			background: radial-gradient(circle at 10% 0%, #ef444433, #111827 60%);
			cursor: not-allowed;
			opacity: 0.7;
		}

		.seat:hover:not(.booked) {
			transform: translateY(-2px);
			box-shadow: 0 10px 25px rgba(15, 23, 42, 0.8);
		}

		.badge {
			display: inline-flex;
			align-items: center;
			gap: 0.4rem;
			font-size: 0.8rem;
			padding: 0.2rem 0.6rem;
			border-radius: 999px;
			background: #0f172a;
			border: 1px solid #1f2937;
			color: #9ca3af;
		}

		.status-dot {
			width: 0.6rem;
			height: 0.6rem;
			border-radius: 999px;
		}

		.dot-available {
			background: #22c55e;
		}

		.dot-booked {
			background: #ef4444;
		}

		.actions {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 1rem;
			margin-top: 1.5rem;
		}

		button.refresh {
			padding: 0.6rem 1rem;
			border-radius: 999px;
			border: 1px solid #374151;
			background: #111827;
			color: #e5e7eb;
			cursor: pointer;
			font-size: 0.9rem;
		}

		button.refresh:hover {
			background: #020617;
		}

		#message {
			min-height: 1.2rem;
			font-size: 0.9rem;
		}

		#message.success {
			color: #22c55e;
		}

		#message.error {
			color: #f97316;
		}

		.footer {
			margin-top: 1.5rem;
			font-size: 0.8rem;
			color: #6b7280;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>Concurrent Ticket Booking</h1>
		<p>Demo of Redis-based seat locking to prevent double booking.</p>

		<div class="badge">
			<span class="status-dot dot-available"></span> Available
			<span style="width: 1px; height: 14px; background: #1f2937; margin: 0 8px;"></span>
			<span class="status-dot dot-booked"></span> Booked
		</div>

		<div id="seats" class="seats"></div>

		<div class="actions">
			<div id="message"></div>
			<button class="refresh" id="refreshBtn">Refresh status</button>
		</div>

		<div class="footer">
			Open this page in multiple tabs and click the same seat quickly to see Redis locking prevent double-booking.
		</div>
	</div>

	<script>
		const seatsContainer = document.getElementById('seats');
		const messageEl = document.getElementById('message');
		const refreshBtn = document.getElementById('refreshBtn');

		function setMessage(text, type = '') {
			messageEl.textContent = text;
			messageEl.className = '';
			if (type) {
				messageEl.classList.add(type);
			}
		}

		async function loadSeats() {
			setMessage('');
			try {
				const res = await fetch('/api/seats');
				if (!res.ok) {
					throw new Error('Failed to load seats');
				}
				const data = await res.json();

				seatsContainer.innerHTML = '';
				Object.entries(data).forEach(([id, status]) => {
					const btn = document.createElement('button');
					btn.textContent = id;
					btn.className = `seat ${status}`;
					btn.onclick = () => attemptBooking(id, status);
					seatsContainer.appendChild(btn);
				});
			} catch (err) {
				console.error(err);
				setMessage('Error loading seats. Check console/logs.', 'error');
			}
		}

		async function attemptBooking(seatId, status) {
			if (status !== 'available') {
				setMessage(`Seat ${seatId} is already booked.`, 'error');
				return;
			}

			setMessage(`Booking seat ${seatId}...`);
			try {
				const res = await fetch(`/api/book?seatId=${encodeURIComponent(seatId)}`, {
					method: 'POST'
				});
				const data = await res.json();

				if (res.ok) {
					setMessage(data.message || `Seat ${seatId} booked.`, 'success');
				} else {
					setMessage(data.message || 'Booking failed.', 'error');
				}

				await loadSeats();
			} catch (err) {
				console.error(err);
				setMessage('Error while booking. Check console/logs.', 'error');
			}
		}

		refreshBtn.addEventListener('click', loadSeats);

		loadSeats();
	</script>
</body>
</html>
