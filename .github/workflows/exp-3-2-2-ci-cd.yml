name: Exp 3.2.2 React CI/CD

on:
  push:
    branches: [main]
    paths:
      - "Exp 3.2.2/**"
      - ".github/workflows/exp-3-2-2-ci-cd.yml"
  pull_request:
    paths:
      - "Exp 3.2.2/**"
      - ".github/workflows/exp-3-2-2-ci-cd.yml"
  workflow_dispatch:

env:
  NODE_VERSION: "18"
  IMAGE_NAME: ${{ github.repository_owner }}/react-cicd-app

jobs:
  install:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Exp 3.2.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Exp 3.2.2/package-lock.json

      - name: Install dependencies
        run: npm ci

  test:
    runs-on: ubuntu-latest
    needs: install
    defaults:
      run:
        working-directory: Exp 3.2.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Exp 3.2.2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests (CI mode)
        run: CI=true npm test -- --watchAll=false --passWithNoTests

  build:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: Exp 3.2.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Exp 3.2.2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: Exp 3.2.2
          file: Exp 3.2.2/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  notify:
    runs-on: ubuntu-latest
    needs: [install, test, build, deploy]
    if: always() && secrets.SLACK_WEBHOOK_URL != ''
    steps:
      - name: Slack success notification
        if: needs.install.result == 'success' && needs.test.result == 'success' && needs.build.result == 'success' && (needs.deploy.result == 'success' || needs.deploy.result == 'skipped')
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title }}
        run: |
          payload=$(cat <<EOF
          {
            "text": "✅ Exp 3.2.2 CI/CD succeeded for ${{ github.repository }}\\nBranch: ${{ github.ref_name }}\\nCommit: ${COMMIT_MESSAGE}"
          }
          EOF
          )
          curl -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"

      - name: Slack failure notification
        if: needs.install.result == 'failure' || needs.test.result == 'failure' || needs.build.result == 'failure' || needs.deploy.result == 'failure'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title }}
        run: |
          payload=$(cat <<EOF
          {
            "text": "❌ Exp 3.2.2 CI/CD failed for ${{ github.repository }}\\nBranch: ${{ github.ref_name }}\\nCommit: ${COMMIT_MESSAGE}\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          )
          curl -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
