<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="char-counter-container">
        <label for="userText" class="char-label">Your Message</label>
        <textarea id="userText" class="char-textarea" rows="5" maxlength="150" placeholder="Type your message..."></textarea>
        <div class="char-count" id="charCount">Character counter: 0 / 150</div>
        <div class="char-limit-message" id="charLimitMessage" style="display: none; color: red; font-weight: bold; margin-top: 4px;">Character limit reached</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
